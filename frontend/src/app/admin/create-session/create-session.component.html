<div class="min-h-screen bg-gradient-to-br from-pink-50 to-white flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">💍</div>
      <h1 class="text-3xl font-bold text-rose-600">Wedding Quest</h1>
      <p class="text-gray-500 mt-2">Admin Panel — Neue Session erstellen</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Session erstellen</h2>

      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 mb-6 text-sm">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="submit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Person A (z.B. Braut)
          </label>
          <input
            type="text"
            [ngModel]="personAName()"
            (ngModelChange)="personAName.set($event)"
            name="personA"
            placeholder="Name der Braut"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Person B (z.B. Bräutigam)
          </label>
          <input
            type="text"
            [ngModel]="personBName()"
            (ngModelChange)="personBName.set($event)"
            name="personB"
            placeholder="Name des Bräutigams"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Host / Moderator
          </label>
          <input
            type="text"
            [ngModel]="hostName()"
            (ngModelChange)="hostName.set($event)"
            name="host"
            placeholder="Dein Name als Moderator"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full bg-rose-500 hover:bg-rose-600 disabled:bg-rose-300 text-white font-semibold py-3 px-6 rounded-full transition-colors duration-200 flex items-center justify-center gap-2"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Erstelle Session...
          } @else {
            Session erstellen
          }
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-400 mt-6">
      Gäste-Ansicht: <a routerLink="/join" class="text-rose-500 hover:underline">/join</a>
    </p>
  </div>
</div>
