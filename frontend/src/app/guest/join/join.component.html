<div class="min-h-screen bg-gradient-to-br from-pink-50 via-white to-rose-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-4 animate-bounce">💒</div>
      <h1 class="text-3xl font-bold text-rose-600">Wedding Quest</h1>
      <p class="text-gray-500 mt-2">Tritt dem Spiel bei!</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 mb-5 text-sm text-center">
          {{ error() }}
        </div>
      }

      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            Session-Code
          </label>
          <input
            type="text"
            [ngModel]="sessionCode()"
            (ngModelChange)="sessionCode.set($event.toUpperCase())"
            placeholder="z.B. ABC123"
            maxlength="10"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition text-center text-xl font-bold tracking-widest uppercase"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            Dein Name
          </label>
          <input
            type="text"
            [ngModel]="displayName()"
            (ngModelChange)="displayName.set($event)"
            placeholder="Wie heisst du?"
            (keyup.enter)="join()"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition"
          />
        </div>

        <button
          (click)="join()"
          [disabled]="loading()"
          class="w-full bg-rose-500 hover:bg-rose-600 disabled:bg-rose-300 text-white font-semibold py-3.5 px-6 rounded-full transition-colors duration-200 flex items-center justify-center gap-2 text-lg"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Beitreten...
          } @else {
            Spiel beitreten 🎮
          }
        </button>
      </div>
    </div>

    <!-- Admin Link -->
    <p class="text-center text-sm text-gray-400 mt-6">
      Du bist der Host?
      <a href="/admin" class="text-rose-500 hover:underline font-medium">Admin Panel →</a>
    </p>
  </div>
</div>
