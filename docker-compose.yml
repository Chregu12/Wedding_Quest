services:
  postgres-session:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wedding_session
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_session_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding_session"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  session-service:
    build:
      context: .
      dockerfile: services/session-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      APP_PORT: 3002
      DATABASE_URL: postgresql://wedding:wedding_secret@postgres-session:5432/wedding_session
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres-session:
        condition: service_healthy
      redis:
        condition: service_healthy

  realtime-service:
    build:
      context: .
      dockerfile: services/realtime-service/Dockerfile
    ports:
      - "3006:3006"
    environment:
      APP_PORT: 3006
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_session_data:
  redis_data:
